<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Beamr Receiver</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  
  <div id="ui-setup" class="screen active">
    <div class="logo-container">
      <svg width="80" height="80" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="border-radius: 16px; box-shadow: 0 4px 24px rgba(16, 185, 129, 0.3);">
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="14" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#34d399"/>
            <stop offset="100%" stop-color="#10b981"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="96" fill="#0f1115"/>
        <rect width="512" height="512" rx="96" fill="url(#bgRadial)" opacity="0"/>
        <circle cx="100" cy="380" r="160" fill="#10b981" opacity="0.05"/>
        <circle cx="420" cy="150" r="140" fill="#3b82f6" opacity="0.04"/>
        <g filter="url(#glow)">
          <g stroke="url(#markGrad)" stroke-width="14" stroke-linecap="round" fill="none">
            <path d="M 152 188 L 152 152 L 188 152" />
            <path d="M 324 152 L 360 152 L 360 188" />
            <path d="M 360 324 L 360 360 L 324 360" />
            <path d="M 188 360 L 152 360 L 152 324" />
          </g>
          <g fill="url(#markGrad)">
            <rect x="206" y="206" width="44" height="44" rx="8"/>
            <rect x="262" y="206" width="44" height="44" rx="8"/>
            <rect x="206" y="262" width="44" height="44" rx="8"/>
            <rect x="262" y="262" width="20" height="20" rx="6"/>
          </g>
        </g>
        <rect x="146" y="254" width="220" height="4" rx="2" fill="#10b981" opacity="0.55">
          <animate attributeName="y" values="160;360;160" dur="2.4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.55;0" dur="2.4s" repeatCount="indefinite"/>
        </rect>
      </svg>
      <h1>Beamr</h1>
    </div>
    <p class="subtitle">Secure, offline file transfer via QR</p>
    
    <div class="card glass">
      <p class="instruction">Point your camera at the Beamr QR code in VSCode to begin the transfer.</p>
      <button id="start-cam-btn" class="btn primary" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
        Enable Camera
      </button>
      <a href="https://marketplace.visualstudio.com/items?itemName=abhishekverma.beamr" target="_blank" rel="noopener noreferrer" class="btn vscode-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#007ACC"><path d="M23.15 2.587L18.21.21a1.494 1.494 0 0 0-1.705.29l-9.46 8.63-4.12-3.128a.999.999 0 0 0-1.276.057L.327 7.261A1 1 0 0 0 .326 8.74L3.899 12 .326 15.26a1 1 0 0 0 .001 1.479L1.65 17.94a.999.999 0 0 0 1.276.057l4.12-3.128 9.46 8.63a1.492 1.492 0 0 0 1.704.29l4.942-2.377A1.5 1.5 0 0 0 24 20.06V3.939a1.5 1.5 0 0 0-.85-1.352zm-5.146 14.861L10.826 12l7.178-5.448v10.896z"/></svg>
        Get VSCode Extension
      </a>
      <p id="cam-error" class="error hidden"></p>
    </div>
  </div>

  <div id="ui-scan" class="screen">
    <div class="viewfinder-container">
      <video id="video" playsinline></video>
      <div class="overlay"></div>
      <div id="viewfinder" class="viewfinder">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="scan-line"></div>
      </div>
      <canvas id="canvas" hidden></canvas>
    </div>
    
    <div class="scan-info glass">
      <div class="info-header">
        <div id="status-text" class="status-text">Waiting for connection...</div>
        <div id="chunk-counter" class="mono stats-badge">0 / --</div>
      </div>
      
      <div class="progress-bg">
        <div id="progress-bar" class="progress"></div>
      </div>
      
      <div class="stats mono">
        <div id="time-estimate" class="dim">Est. remaining: --</div>
      </div>
      
      <div id="log-container" class="mono dim log-scroll">
        <!-- raw indices log -->
      </div>
    </div>
  </div>

  <div id="ui-done" class="screen">
    <div class="logo-container">
      <svg width="80" height="80" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" style="border-radius: 16px; box-shadow: 0 4px 24px rgba(16, 185, 129, 0.3);">
        <defs>
          <filter id="glow-done" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="14" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <linearGradient id="markGrad-done" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#34d399"/>
            <stop offset="100%" stop-color="#10b981"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="96" fill="#0f1115"/>
        <rect width="512" height="512" rx="96" fill="url(#bgRadial)" opacity="0"/>
        <circle cx="100" cy="380" r="160" fill="#10b981" opacity="0.05"/>
        <circle cx="420" cy="150" r="140" fill="#3b82f6" opacity="0.04"/>
        <g filter="url(#glow-done)">
          <g stroke="url(#markGrad-done)" stroke-width="14" stroke-linecap="round" fill="none">
            <path d="M 152 188 L 152 152 L 188 152" />
            <path d="M 324 152 L 360 152 L 360 188" />
            <path d="M 360 324 L 360 360 L 324 360" />
            <path d="M 188 360 L 152 360 L 152 324" />
          </g>
          <g fill="url(#markGrad-done)">
            <rect x="206" y="206" width="44" height="44" rx="8"/>
            <rect x="262" y="206" width="44" height="44" rx="8"/>
            <rect x="206" y="262" width="44" height="44" rx="8"/>
            <rect x="262" y="262" width="20" height="20" rx="6"/>
          </g>
        </g>
        <rect x="146" y="254" width="220" height="4" rx="2" fill="#10b981" opacity="0.55">
          <animate attributeName="y" values="160;360;160" dur="2.4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.55;0" dur="2.4s" repeatCount="indefinite"/>
        </rect>
      </svg>
      <h1>Transfer Complete</h1>
    </div>
    
    <div class="done-card glass">
      <div class="file-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      </div>
      <div id="done-filename" class="mono large">--</div>
      <div id="done-filesize" class="dim mono">-- bytes</div>
      <button id="download-btn" class="btn primary">Download File</button>
    </div>
    <button id="reset-btn" class="btn ghost">Scan Another File</button>
    <a href="https://marketplace.visualstudio.com/items?itemName=abhishekverma.beamr" target="_blank" rel="noopener noreferrer" class="btn vscode-btn" style="margin-top: 16px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#007ACC"><path d="M23.15 2.587L18.21.21a1.494 1.494 0 0 0-1.705.29l-9.46 8.63-4.12-3.128a.999.999 0 0 0-1.276.057L.327 7.261A1 1 0 0 0 .326 8.74L3.899 12 .326 15.26a1 1 0 0 0 .001 1.479L1.65 17.94a.999.999 0 0 0 1.276.057l4.12-3.128 9.46 8.63a1.492 1.492 0 0 0 1.704.29l4.942-2.377A1.5 1.5 0 0 0 24 20.06V3.939a1.5 1.5 0 0 0-.85-1.352zm-5.146 14.861L10.826 12l7.178-5.448v10.896z"/></svg>
      Get VSCode Extension
    </a>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <span>Crafted by Abhishek</span>
      <div class="social-links">
        <a href="https://github.com/w3abhishek" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>
        </a>
        <a href="https://x.com/pyvrma" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter)">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"></path></svg>
        </a>
      </div>
    </div>
  </footer>

  <script src="lib/jsQR.js"></script>
  <script src="lib/pako.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
